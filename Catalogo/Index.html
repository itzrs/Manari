<!DOCTYPE html> <!-- Todos os documentos HTML tem. Ele informa a versão do HTML no documento, também exibindo que é um site ao computador.-->
<html lang="en">  <!-- Serve para definir o idioma principal que vai ser usado. Nesse caso, inglês. -->
<head> <!-- Ele é onde "armazena" os metadados (dados sobre os dados) como o cabeçalho, título, codificação de caracteres, links, etc. -->
    <meta charset="UTF-8"> <!-- São conjunto de caracteres -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- Define a largura/ tamanho inicial da página -->
    <title>MANARI</title> <!-- É o título da aba .-->
    <link rel="stylesheet" href="style.css">
</head>
<body> <!-- Tudo o que aparece na tela -->
     <div class = "card"> <!-- É como uma caixa para as tags -->
          <h1> MANARI arts </h1> <!-- Título, se diferencia do p porque é o que o Google procura -->
          <img src="https://www.petz.com.br/blog/wp-content/uploads/2019/07/vida-de-gato.webp" alt="GATO"> <!-- img serve pra exibir a imagem e alt para descrever a imagem  -->
          <a href="url"></a> <!-- href define o destino de um link -->
          <button>Passar imagem</button> <!-- Para  criar um elemento clicável -->

     </div>


</body>
</html>
